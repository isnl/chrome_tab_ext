<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Spark Burst Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #1a1333, #2d1b69);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: system-ui, sans-serif;
  color: #fff;
  cursor: pointer;
  user-select: none;
}
.hint {
  font-size: 22px;
  opacity: 0.6;
  pointer-events: none;
}
.spark-layer {
  position: fixed;
  inset: 0;
  z-index: 9999;
  pointer-events: none;
  overflow: visible;
}
.spark-burst {
  position: absolute;
  width: 0;
  height: 0;
  overflow: visible;
}
.spark {
  position: absolute;
  left: 0;
  top: 0;
  width: var(--spark-size);
  height: var(--spark-size);
  border-radius: 2px;
  background: var(--spark-color);
  box-shadow: 0 0 6px var(--spark-color), 0 0 0 1px rgba(255,255,255,0.5);
  opacity: 0;
  transform: translate(-50%, -50%) scale(0.3) rotate(var(--spark-rotate));
  animation: spark-pop 700ms cubic-bezier(0.17, 0.84, 0.3, 1) var(--spark-delay) forwards;
}
.spark:nth-child(3n) { border-radius: 999px; }
.spark:nth-child(4n) {
  clip-path: polygon(50% 0, 62% 35%, 100% 50%, 62% 65%, 50% 100%, 38% 65%, 0 50%, 38% 35%);
}

@keyframes spark-pop {
  0% {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0.2) rotate(var(--spark-rotate));
  }
  16% { opacity: 1; }
  72% { opacity: 1; }
  100% {
    opacity: 0;
    transform: translate(calc(-50% + var(--spark-x)), calc(-50% + var(--spark-y))) scale(1) rotate(calc(var(--spark-rotate) + 155deg));
  }
}
</style>
</head>
<body>
<p class="hint">点击页面任意位置查看礼花效果</p>
<div class="spark-layer" id="sparkLayer"></div>

<script>
const particles = [
  { x: 0, y: -38, size: 6, color: '#14b8a6', delay: 0, rotate: '22deg' },
  { x: 28, y: -28, size: 5, color: '#6366f1', delay: 20, rotate: '84deg' },
  { x: 38, y: -2, size: 7, color: '#f59e0b', delay: 10, rotate: '145deg' },
  { x: 28, y: 26, size: 5, color: '#22c55e', delay: 30, rotate: '196deg' },
  { x: 0, y: 38, size: 6, color: '#ec4899', delay: 12, rotate: '246deg' },
  { x: -28, y: 28, size: 5, color: '#0ea5e9', delay: 24, rotate: '305deg' },
  { x: -38, y: 1, size: 7, color: '#14b8a6', delay: 5, rotate: '18deg' },
  { x: -26, y: -26, size: 5, color: '#f97316', delay: 18, rotate: '112deg' },
  { x: 14, y: -20, size: 4, color: '#a855f7', delay: 40, rotate: '210deg' },
  { x: 20, y: 17, size: 4, color: '#06b6d4', delay: 35, rotate: '272deg' },
  { x: -17, y: 19, size: 4, color: '#84cc16', delay: 44, rotate: '332deg' },
  { x: -15, y: -19, size: 4, color: '#f43f5e', delay: 32, rotate: '64deg' },
];

const layer = document.getElementById('sparkLayer');

document.addEventListener('click', (e) => {
  const burst = document.createElement('span');
  burst.className = 'spark-burst';
  burst.style.left = e.clientX + 'px';
  burst.style.top = e.clientY + 'px';

  particles.forEach(p => {
    const spark = document.createElement('span');
    spark.className = 'spark';
    spark.style.setProperty('--spark-x', p.x + 'px');
    spark.style.setProperty('--spark-y', p.y + 'px');
    spark.style.setProperty('--spark-size', p.size + 'px');
    spark.style.setProperty('--spark-color', p.color);
    spark.style.setProperty('--spark-delay', p.delay + 'ms');
    spark.style.setProperty('--spark-rotate', p.rotate);
    burst.appendChild(spark);
  });

  layer.appendChild(burst);
  setTimeout(() => burst.remove(), 800);
});
</script>
</body>
</html>
